<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #000; color: white; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .input-masha { border: none; border-bottom: 1px solid #333; padding: 12px 0; width: 100%; background: transparent; color: white; outline: none; }
    .input-masha:focus { border-bottom-color: #facc15; }
    .spinner-wave { width: 48px; height: 48px; border: 4px solid #ffffff; border-bottom-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .modal-enter { animation: modalIn 0.3s ease-out forwards; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    /* === SCROLLBAR ESTÉTICO PARA EL MODAL === */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    * { scrollbar-width: thin; scrollbar-color: #374151 transparent; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <nav class="w-full pt-8 pb-4 flex justify-between items-center px-6 md:px-12 border-b border-gray-900 bg-[#0b0f19]">
    
    <a onclick="google.script.run.withSuccessHandler(url => window.top.location.href = url).getScriptUrl()" class="flex items-center gap-2 text-gray-400 hover:text-yellow-400 transition text-xs font-bold tracking-widest uppercase cursor-pointer">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      <span>Volver al catálogo</span>
    </a>

    <div class="flex items-center gap-4">
        <button id="btnAdd" onclick="abrirModal()" class="hidden text-xs uppercase tracking-widest font-bold text-blue-500 hover:text-white transition-colors">+ ARTÍCULO</button>
        <button id="btnLogin" onclick="toggleLogin()" class="flex items-center gap-1.5 text-xs uppercase tracking-widest font-bold text-white hover:text-yellow-400 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          <span id="loginText">LOGIN</span>
        </button>
    </div>
  </nav>

  <div class="w-full bg-[#111827] border-b border-gray-900 py-8 px-6 text-center relative overflow-hidden">
      <div class="absolute -right-20 -top-20 w-64 h-64 bg-yellow-400 rounded-full blur-3xl opacity-5"></div>
      <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-blue-500 rounded-full blur-3xl opacity-5"></div>
      
      <h1 class="font-oswald text-3xl md:text-4xl tracking-[0.1em] text-white uppercase mb-2 relative z-10">Hola Filmmaker</h1>
      <p class="text-base md:text-lg text-gray-300 font-bold tracking-wide mb-5 relative z-10">¿Quieres ser parte del equipo?</p>
      
      <a href="https://wa.me/51934816869?text=%C2%A1Hola!%20Quiero%20ser%20parte%20del%20equipo%20de%20filmmakers%20de%20FreeRide" target="_blank" class="relative z-10 bg-blue-600 text-white px-6 py-3 rounded-full text-xs font-black uppercase tracking-[0.2em] hover:bg-yellow-400 hover:text-black transition shadow-lg inline-flex items-center gap-3 mx-auto">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
          CONTÁCTANOS
      </a>
  </div>

  <main class="px-6 py-16 flex-grow w-full max-w-[1200px] mx-auto">
    <div class="flex items-center gap-4 mb-10">
        <div class="h-px bg-gray-800 flex-grow"></div>
        <h2 class="text-xl font-black tracking-widest uppercase text-white">Equípate con nosotros</h2>
        <div class="h-px bg-gray-800 flex-grow"></div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center mt-10 hidden">
        <div class="spinner-wave mb-6"></div>
    </div>

    <div id="merchContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
  </main>

  <footer class="bg-[#0b0f19] border-t border-gray-900 text-white py-8 mt-auto w-full text-center text-[10px] text-gray-500 uppercase tracking-widest">
     <p>© 2026 Free Ride | Designed by: Fabian Montoya</p>
  </footer>

  <div id="modalAdd" class="fixed inset-0 bg-black/95 z-[70] hidden flex flex-col items-center justify-start p-4 md:p-10 overflow-y-auto">
    <div class="bg-[#111827] border border-gray-800 p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl relative max-h-[90vh] overflow-y-auto flex flex-col modal-enter">
        <button onclick="cerrarModal()" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white">×</button>
        <h2 id="modalTitle" class="text-xl font-black text-white tracking-tight mb-6 uppercase">AÑADIR ARTÍCULO</h2>
        
        <div class="flex flex-col gap-4">
            <input type="hidden" id="editId">
            <input type="hidden" id="currentImgUrl">
            <input type="hidden" id="compressedBase64">
            
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Artículo</label>
              <input type="text" id="merchName" class="input-masha text-sm font-medium" placeholder="EJ: POLERA FREE RIDE">
            </div>
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Precio</label>
              <input type="text" id="merchPrice" class="input-masha text-sm text-yellow-400 font-bold" placeholder="EJ: S/. 60.00">
            </div>
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Descripción</label>
              <textarea id="merchDesc" rows="2" class="input-masha text-xs resize-none" placeholder="Detalles de tallas, material..."></textarea>
            </div>
            
            <div class="flex items-center gap-6 pt-2">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="merchHidden" class="w-4 h-4 accent-red-600">
                    <label class="text-xs uppercase tracking-widest font-bold text-red-500">OCULTAR</label>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="merchAgotado" class="w-4 h-4 accent-orange-500">
                    <label class="text-xs uppercase tracking-widest font-bold text-orange-400">AGOTADO</label>
                </div>
            </div>

            <div class="mt-2">
                <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold mb-3 block">Foto del Producto</label>
                <div id="uploadContainer">
                    <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-800 border-dashed cursor-pointer bg-[#111827] hover:bg-gray-800 transition-colors rounded-xl">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">Subir Imagen</span>
                        </div>
                        <input id="merchFile" type="file" class="hidden" accept="image/*" onchange="previewAndCompressImage(this)" />
                    </label>
                </div>
                <div id="previewContainer" class="mt-2 w-full aspect-square overflow-hidden hidden shadow-md border border-gray-800 relative rounded-xl bg-[#111827]">
                     <img id="preview" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                     <button onclick="quitarImagen()" class="absolute top-3 right-3 bg-red-600/90 text-white text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-widest shadow-lg hover:bg-red-500 transition backdrop-blur-sm">Quitar</button>
                </div>
            </div>

            <button id="btnSave" onclick="guardar()" class="w-full bg-blue-600 text-white py-4 rounded-full text-xs tracking-widest mt-4 font-bold hover:bg-yellow-400 hover:text-black transition">GUARDAR</button>
        </div>
    </div>
  </div>

  <div id="modalLogin" class="fixed inset-0 bg-black/95 z-[60] hidden flex justify-center items-center">
    <div class="w-80 bg-[#111827] border border-gray-800 p-8 shadow-2xl flex flex-col gap-6 rounded-2xl">
      <h2 class="text-xs font-bold tracking-[0.2em] mb-2 text-center text-white">ACCESO AL SISTEMA</h2>
      <input type="email" id="userEmail" placeholder="CORREO" class="input-masha text-sm">
      <input type="password" id="userPass" placeholder="CONTRASEÑA" class="input-masha text-sm">
      <button id="btnEntrar" onclick="doLogin()" class="bg-blue-600 text-white py-4 rounded-full text-xs tracking-widest mt-4 hover:bg-blue-500 transition shadow-lg font-bold">ENTRAR</button>
      <button onclick="cerrarLogin()" class="text-[10px] tracking-widest text-gray-500 hover:text-red-400 text-center uppercase font-bold transition">CANCELAR</button>
    </div>
  </div>

  <script>
    let currentUserRole = null; 
    let currentUserName = ''; 
    let merchList = [];

    window.onload = () => { checkSession(); };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modales = [
                {id: 'modalAdd', fn: typeof cerrarModal === 'function' ? cerrarModal : null},
                {id: 'modalLogin', fn: typeof cerrarLogin === 'function' ? cerrarLogin : null}
            ];
            modales.forEach(m => {
                const el = document.getElementById(m.id);
                if (el && !el.classList.contains('hidden') && m.fn) m.fn();
            });
        }
        if (e.key === 'Enter') {
            if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') return;
            const openModal = [
                {id: 'modalAdd', fn: typeof guardar === 'function' ? guardar : null},
                {id: 'modalLogin', fn: typeof doLogin === 'function' ? doLogin : null}
            ].find(m => {
                const el = document.getElementById(m.id);
                return el && !el.classList.contains('hidden');
            });
            if (openModal && openModal.fn) {
                e.preventDefault();
                openModal.fn();
            }
        }
    });

    function checkSession() {
      const savedRole = localStorage.getItem('fr_role');
      const savedName = localStorage.getItem('fr_name');
      
      if (savedRole && savedName) {
          currentUserRole = savedRole; currentUserName = savedName; activarInterfaz();
      } else {
          google.script.url.getLocation(function(loc) {
            if (loc && loc.parameter && loc.parameter.v === 'leolu') {
              currentUserRole = 'MASTER'; currentUserName = 'MASTER';
              localStorage.setItem('fr_role', 'MASTER'); localStorage.setItem('fr_name', 'MASTER');
            }
            activarInterfaz();
          });
      }
    }

    function getSafeUrl(val) {
        if(!val) return 'https://placehold.co/600x800/111827/FFFFFF?text=MERCH';
        if(val.toString().includes('http') || val.toString().startsWith('data:')) return val;
        return 'https://drive.google.com/thumbnail?id=' + val + '&sz=w1200';
    }

    function cargarDatos() {
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('merchContainer').innerHTML = '';
        google.script.run.withSuccessHandler(renderGrid).withFailureHandler((err)=>alert("Error cargando: " + err.message)).obtenerMerch();
    }

    function renderGrid(data) {
        merchList = data;
        document.getElementById('loader').classList.add('hidden');
        const container = document.getElementById('merchContainer');
        
        if(data.length === 0) {
            container.innerHTML = `<p class="col-span-full text-center text-xs text-gray-500 uppercase tracking-widest mt-10">Catálogo vacío por el momento...</p>`;
            return;
        }

        data.forEach(m => {
            let isMaster = currentUserRole === 'MASTER';
            if(!isMaster && m.oculto) return;

            const adminBtns = isMaster ? `
                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition z-20">
                    <button onclick="editar(${m.id})" class="bg-blue-600 w-8 h-8 rounded-full text-white text-xs hover:bg-yellow-400 hover:text-black shadow-md">✎</button>
                    <button onclick="borrar(${m.id})" class="bg-gray-900 w-8 h-8 rounded-full text-red-500 text-xs hover:bg-red-600 hover:text-white shadow-md">×</button>
                </div>
            ` : '';

            const badgeOculto = (m.oculto && isMaster) ? `<div class="absolute top-2 left-2 bg-red-600/90 text-white text-[9px] font-bold px-2 py-1 rounded z-20 uppercase tracking-widest shadow-md">OCULTO</div>` : '';
            const badgeAgotado = m.agotado ? `<div class="absolute inset-0 bg-black/60 flex items-center justify-center z-10 backdrop-blur-[1px]"><span class="bg-red-600 text-white font-black px-6 py-2 uppercase tracking-widest shadow-2xl border-2 border-white transform -rotate-12 rounded md:text-xl">AGOTADO</span></div>` : '';

            const btnText = m.agotado ? 'AGOTADO' : 'Me Interesa';
            const btnState = m.agotado ? 'opacity-30 cursor-not-allowed border-gray-600 text-gray-500' : 'hover:bg-white hover:text-black border-gray-700 text-gray-300 hover:shadow-lg';
            const btnClick = m.agotado ? '' : `onclick="window.open('https://wa.me/51934816869?text=${encodeURIComponent('Hola! Me interesa este artículo de FreeRide: ' + m.nombre)}', '_blank')"`;

            container.innerHTML += `
                <div class="bg-[#0b0f19] border border-gray-900 rounded-xl overflow-hidden shadow-lg relative group hover:border-gray-700 transition">
                    ${badgeOculto} ${adminBtns}
                    <div class="w-full aspect-square bg-[#111827] overflow-hidden relative">
                        ${badgeAgotado}
                        <img src="${getSafeUrl(m.imagen)}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://placehold.co/600x600/111827/FFFFFF?text=MERCH';">
                    </div>
                    <div class="p-4 flex flex-col items-center text-center">
                        <h3 class="text-sm font-black uppercase text-white mb-1">${m.nombre}</h3>
                        <p class="text-xs text-yellow-400 font-bold tracking-widest mb-2">${m.precio}</p>
                        <p class="text-[10px] text-gray-400 mb-4 px-2 line-clamp-2">${m.descripcion}</p>
                        <button ${btnClick} class="w-full bg-transparent border py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition ${btnState}" ${m.agotado ? 'disabled' : ''}>${btnText}</button>
                    </div>
                </div>
            `;
        });
    }

    function previewAndCompressImage(input) {
      if (input.files && input.files[0]) {
        const r = new FileReader();
        r.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > 800) { h *= 800/w; w = 800; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8); 
            document.getElementById('preview').src = dataUrl;
            document.getElementById('compressedBase64').value = dataUrl;
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('uploadContainer').classList.add('hidden');
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(input.files[0]);
      }
    }

    function abrirModal() {
        document.getElementById('modalTitle').innerText = 'AÑADIR ARTÍCULO';
        document.getElementById('editId').value = ''; document.getElementById('currentImgUrl').value = ''; document.getElementById('compressedBase64').value = '';
        document.getElementById('merchName').value = ''; document.getElementById('merchPrice').value = ''; document.getElementById('merchDesc').value = '';
        document.getElementById('merchHidden').checked = false; document.getElementById('merchAgotado').checked = false;
        quitarImagen(); document.getElementById('modalAdd').classList.remove('hidden');
    }
    
    function cerrarModal() { document.getElementById('modalAdd').classList.add('hidden'); }
    function quitarImagen() {
        document.getElementById('merchFile').value = ''; document.getElementById('compressedBase64').value = '';
        document.getElementById('previewContainer').classList.add('hidden'); document.getElementById('uploadContainer').classList.remove('hidden');
    }

    function editar(id) {
        const m = merchList.find(x => x.id == id);
        if(!m) return;
        document.getElementById('modalTitle').innerText = 'EDITAR ARTÍCULO';
        document.getElementById('editId').value = m.id; document.getElementById('currentImgUrl').value = m.imagen;
        document.getElementById('merchName').value = m.nombre; document.getElementById('merchPrice').value = m.precio;
        document.getElementById('merchDesc').value = m.descripcion; 
        document.getElementById('merchHidden').checked = !!m.oculto; document.getElementById('merchAgotado').checked = !!m.agotado;
        
        if (m.imagen) {
            document.getElementById('preview').src = getSafeUrl(m.imagen);
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('uploadContainer').classList.add('hidden');
        }
        document.getElementById('modalAdd').classList.remove('hidden');
    }

    function guardar() {
        const btn = document.getElementById('btnSave');
        const payload = {
            id: document.getElementById('editId').value, nombre: document.getElementById('merchName').value,
            precio: document.getElementById('merchPrice').value, descripcion: document.getElementById('merchDesc').value,
            oculto: document.getElementById('merchHidden').checked, agotado: document.getElementById('merchAgotado').checked,
            imagenBase64: document.getElementById('compressedBase64').value, imagenActual: document.getElementById('currentImgUrl').value
        };

        if(!payload.nombre) { alert("Falta Nombre"); return; }
        btn.innerText = "GUARDANDO..."; btn.disabled = true;
        google.script.run
            .withSuccessHandler(r => {
                btn.innerText = "GUARDAR"; btn.disabled = false;
                if(r.success) { cerrarModal(); cargarDatos(); } else { alert("Error"); }
            }).withFailureHandler((err) => { alert("Error guardando merch: " + err.message); btn.disabled = false; btn.innerText = "GUARDAR"; })
            .procesarMerch(payload);
    }

    function borrar(id) {
        if(confirm("¿Eliminar artículo?")) { google.script.run.withSuccessHandler(r => { if(r.success) cargarDatos(); }).borrarMerch(id); }
    }

    function activarInterfaz() {
        const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.add('hidden');
        const lText = document.getElementById('loginText'); if(lText) lText.innerText = 'LOGOUT';
        
        const bAdd = document.getElementById('btnAdd');
        if(currentUserRole === 'MASTER') {
            if(bAdd) bAdd.classList.remove('hidden');
        } else {
            if(bAdd) bAdd.classList.add('hidden');
        }
        cargarDatos();
    }

    function toggleLogin() {
      if(currentUserRole !== null) {
        currentUserRole = null; currentUserName = ''; localStorage.removeItem('fr_role'); localStorage.removeItem('fr_name');
        const lText = document.getElementById('loginText'); if(lText) lText.innerText = 'LOGIN';
        const bAdd = document.getElementById('btnAdd'); if(bAdd) bAdd.classList.add('hidden');
        cargarDatos();
      } else { 
        const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.remove('hidden'); 
        setTimeout(() => { const em = document.getElementById('userEmail'); if(em) em.focus(); }, 100);
      }
    }
    
    function cerrarLogin() { const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.add('hidden'); }
    
    function doLogin() {
      const email = document.getElementById('userEmail').value.trim(); const pass = document.getElementById('userPass').value.trim();
      const btn = document.getElementById('btnEntrar'); btn.innerText = 'VERIFICANDO...'; btn.disabled = true;

      google.script.run
          .withSuccessHandler((res) => {
              btn.innerText = 'ENTRAR'; btn.disabled = false;
              if(res.success) {
                  currentUserRole = res.role; currentUserName = res.nombre;
                  localStorage.setItem('fr_role', res.role); localStorage.setItem('fr_name', res.nombre);
                  document.getElementById('userEmail').value = ''; document.getElementById('userPass').value = '';
                  activarInterfaz();
              } else { alert(res.error); }
          })
          .withFailureHandler((err) => { btn.innerText = 'ENTRAR'; btn.disabled = false; alert('Error de conexión: ' + err.message); })
          .validarAcceso(email, pass);
    }
  </script>
</body>
</html>
