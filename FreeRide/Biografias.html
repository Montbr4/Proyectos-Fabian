<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="referrer" content="no-referrer">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #000; color: white; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .input-masha { border: none; border-bottom: 1px solid #333; padding: 12px 0; width: 100%; outline: none; transition: border-color 0.3s; background: transparent; color: white; }
    .input-masha:focus { border-bottom-color: #facc15; }
    .spinner-wave { width: 48px; height: 48px; border: 4px solid #ffffff; border-bottom-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal-enter { animation: modalIn 0.3s ease-out forwards; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    * { scrollbar-width: thin; scrollbar-color: #374151 transparent; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <nav class="w-full pt-8 pb-4 flex justify-between items-center px-6 md:px-12 border-b border-gray-900 bg-[#0b0f19]">
    
    <a onclick="google.script.run.withSuccessHandler(url => window.top.location.href = url).getScriptUrl()" class="flex items-center gap-2 text-gray-400 hover:text-yellow-400 transition text-xs font-bold tracking-widest uppercase cursor-pointer">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      <span>Volver al catálogo</span>
    </a>

    <div class="flex items-center gap-4">
        <button id="btnAdd" onclick="abrirModal()" class="hidden text-xs uppercase tracking-widest font-bold text-blue-500 hover:text-white transition-colors">+ MIEMBRO</button>
        <button id="btnLogin" onclick="toggleLogin()" class="flex items-center gap-1.5 text-xs uppercase tracking-widest font-bold text-white hover:text-yellow-400 transition-colors group">
          <svg class="w-4 h-4 transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          <span id="loginText">LOGIN</span>
        </button>
    </div>
  </nav>

  <main class="px-6 py-12 flex-grow w-full max-w-[1200px] mx-auto">
    <div class="text-center mb-16">
        <h1 class="font-oswald text-4xl md:text-5xl tracking-[0.1em] text-white uppercase mb-2">Nuestro Equipo</h1>
        <p class="text-gray-400 text-sm tracking-widest uppercase">Los ojos detrás del lente en la Costa Verde</p>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center mt-10 hidden">
        <div class="spinner-wave mb-6"></div>
    </div>

    <div id="equipoContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
  </main>

  <footer class="bg-[#0b0f19] border-t border-gray-900 text-white py-8 mt-auto w-full text-center text-[10px] text-gray-500 uppercase tracking-widest">
     <p>© 2026 Free Ride | Designed by: Fabian Montoya</p>
  </footer>

  <div id="modalAdd" class="fixed inset-0 bg-black/95 z-[70] hidden flex flex-col items-center justify-start p-4 md:p-10 overflow-y-auto">
    <div class="bg-[#111827] border border-gray-800 p-6 md:p-8 rounded-2xl w-full max-w-lg shadow-2xl modal-enter relative max-h-[90vh] overflow-y-auto flex flex-col">
        <button onclick="cerrarModal()" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white">×</button>
        <h2 id="modalTitle" class="text-xl font-black text-white tracking-tight mb-6 uppercase">NUEVO MIEMBRO</h2>
        
        <div class="flex flex-col gap-4">
            <input type="hidden" id="editId">
            <input type="hidden" id="currentImgUrl">
            <input type="hidden" id="compressedBase64">
            
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Nombre</label>
              <input type="text" id="memName" class="input-masha text-sm font-medium" placeholder="EJ: JUAN PÉREZ">
            </div>
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Rol</label>
              <input type="text" id="memRole" class="input-masha text-sm text-yellow-400 font-bold" placeholder="EJ: FILMMAKER SENIOR">
            </div>
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Biografía</label>
              <textarea id="memBio" rows="3" class="input-masha text-xs text-gray-300 resize-none" placeholder="Un poco sobre su estilo..."></textarea>
            </div>
            <div>
              <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold">Link Instagram</label>
              <input type="text" id="memInsta" class="input-masha text-sm" placeholder="https://instagram.com/...">
            </div>

            <div class="mt-2">
                <label class="text-[10px] uppercase text-gray-500 tracking-widest font-bold mb-3 block">Foto de Perfil</label>
                <div id="uploadContainer">
                    <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-800 border-dashed cursor-pointer bg-[#111827] hover:bg-gray-800 transition-colors rounded-xl">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Subir Imagen</span>
                        </div>
                        <input id="memFile" type="file" class="hidden" accept="image/*" onchange="previewAndCompressImage(this)" />
                    </label>
                </div>
                <div id="previewContainer" class="mt-2 w-32 h-32 mx-auto overflow-hidden hidden shadow-md border border-gray-800 relative group rounded-full bg-[#111827]">
                     <img id="preview" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                     <button onclick="quitarImagen()" class="absolute inset-0 bg-black/60 text-white text-[10px] font-bold uppercase flex items-center justify-center opacity-0 group-hover:opacity-100 transition z-50 cursor-pointer">Quitar</button>
                </div>
            </div>

            <button id="btnSave" onclick="guardar()" class="w-full bg-blue-600 text-white py-4 rounded-full text-xs tracking-widest mt-4 font-bold hover:bg-yellow-400 hover:text-black transition">GUARDAR</button>
        </div>
    </div>
  </div>

  <div id="modalLogin" class="fixed inset-0 bg-black/95 z-[60] hidden flex justify-center items-center">
    <div class="w-80 bg-[#111827] border border-gray-800 p-8 shadow-2xl flex flex-col gap-6 rounded-2xl">
      <h2 class="text-xs font-bold tracking-[0.2em] mb-2 text-center text-white">ACCESO ADMIN</h2>
      <input type="email" id="userEmail" placeholder="E-MAIL" class="input-masha text-sm">
      <input type="password" id="userPass" placeholder="CONTRASEÑA" class="input-masha text-sm">
      <button id="btnEntrar" onclick="doLogin()" class="bg-blue-600 text-white py-4 rounded-full text-xs tracking-widest mt-4 hover:bg-blue-500 transition shadow-lg font-bold">ENTRAR</button>
      <button onclick="cerrarLogin()" class="text-[10px] tracking-widest text-gray-500 hover:text-red-400 text-center uppercase font-bold transition">CANCELAR</button>
    </div>
  </div>

  <script>
    let currentUserRole = null; 
    let currentUserName = ''; 
    let equipoList = [];

    window.onload = () => { 
        checkSession(); 
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modales = [
                {id: 'modalAdd', fn: typeof cerrarModal === 'function' ? cerrarModal : null},
                {id: 'modalLogin', fn: typeof cerrarLogin === 'function' ? cerrarLogin : null}
            ];
            modales.forEach(m => {
                const el = document.getElementById(m.id);
                if (el && !el.classList.contains('hidden') && m.fn) m.fn();
            });
        }
        if (e.key === 'Enter') {
            if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') return;
            const openModal = [
                {id: 'modalAdd', fn: typeof guardar === 'function' ? guardar : null},
                {id: 'modalLogin', fn: typeof doLogin === 'function' ? doLogin : null}
            ].find(m => {
                const el = document.getElementById(m.id);
                return el && !el.classList.contains('hidden');
            });
            if (openModal && openModal.fn) {
                e.preventDefault();
                openModal.fn();
            }
        }
    });

    function checkSession() {
      const savedRole = localStorage.getItem('fr_role');
      const savedName = localStorage.getItem('fr_name');
      
      if (savedRole && savedName) {
          currentUserRole = savedRole;
          currentUserName = savedName;
          activarInterfaz();
      } else {
          google.script.url.getLocation(function(loc) {
            if (loc && loc.parameter && loc.parameter.v === 'leolu') {
              currentUserRole = 'MASTER';
              currentUserName = 'MASTER';
              localStorage.setItem('fr_role', 'MASTER');
              localStorage.setItem('fr_name', 'MASTER');
            }
            activarInterfaz();
          });
      }
    }

    function getSafeUrl(val) {
        if(!val) return 'https://placehold.co/600x800/111827/FFFFFF?text=FOTO';
        if(val.toString().includes('http') || val.toString().startsWith('data:')) return val;
        return 'https://drive.google.com/thumbnail?id=' + val + '&sz=w1200';
    }

    function cargarDatos() {
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('equipoContainer').innerHTML = '';
        google.script.run
            .withSuccessHandler(renderGrid)
            .withFailureHandler((err)=>alert("Error cargando equipo: " + err.message))
            .obtenerEquipo();
    }

    function renderGrid(data) {
        equipoList = data;
        document.getElementById('loader').classList.add('hidden');
        const container = document.getElementById('equipoContainer');
        
        if(data.length === 0) {
            container.innerHTML = `<p class="col-span-full text-center text-xs text-gray-500 uppercase tracking-widest mt-10">Próximamente...</p>`;
            return;
        }

        data.forEach(m => {
            const isMaster = currentUserRole === 'MASTER';
            
            const adminBtns = isMaster ? `
                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition z-20">
                    <button onclick="editar(${m.id})" class="bg-blue-600 w-7 h-7 rounded-full text-white text-xs hover:bg-yellow-400 hover:text-black shadow-md">✎</button>
                    <button onclick="borrar(${m.id})" class="bg-red-600 w-7 h-7 rounded-full text-white text-xs shadow-md">×</button>
                </div>
            ` : '';

            const instaBtn = m.instagram ? `
                <a href="${m.instagram}" target="_blank" class="text-gray-400 hover:text-yellow-400 transition mt-2 inline-block">
                    <svg class="w-5 h-5 mx-auto" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                </a>
            ` : '';

            container.innerHTML += `
                <div class="bg-[#111827] border border-gray-800 rounded-2xl p-6 flex flex-col items-center text-center relative group hover:border-gray-600 transition shadow-lg">
                    ${adminBtns}
                    <div class="w-24 h-24 rounded-full overflow-hidden mb-4 border-2 border-yellow-400">
                        <img src="${getSafeUrl(m.imagen)}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/111827/FFFFFF?text=FOTO';">
                    </div>
                    <h3 class="text-lg font-black uppercase text-white mb-1">${m.nombre}</h3>
                    <p class="text-[10px] text-yellow-400 font-bold tracking-[0.2em] mb-4">${m.rol}</p>
                    <p class="text-xs text-gray-400 leading-relaxed mb-6 px-2 flex-grow">${m.biografia}</p>
                    ${instaBtn}
                </div>
            `;
        });
    }

    function previewAndCompressImage(input) {
      if (input.files && input.files[0]) {
        const r = new FileReader();
        r.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > 800) { h *= 800/w; w = 800; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8); 
            document.getElementById('preview').src = dataUrl;
            document.getElementById('compressedBase64').value = dataUrl;
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('uploadContainer').classList.add('hidden');
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(input.files[0]);
      }
    }

    function abrirModal() {
        document.getElementById('modalTitle').innerText = 'NUEVO MIEMBRO';
        document.getElementById('editId').value = '';
        document.getElementById('currentImgUrl').value = '';
        document.getElementById('compressedBase64').value = '';
        document.getElementById('memName').value = '';
        document.getElementById('memRole').value = '';
        document.getElementById('memBio').value = '';
        document.getElementById('memInsta').value = '';
        quitarImagen(); document.getElementById('modalAdd').classList.remove('hidden');
    }
    
    function cerrarModal() { document.getElementById('modalAdd').classList.add('hidden'); }
    function quitarImagen() {
        document.getElementById('memFile').value = '';
        document.getElementById('compressedBase64').value = '';
        document.getElementById('previewContainer').classList.add('hidden');
        document.getElementById('uploadContainer').classList.remove('hidden');
    }

    function editar(id) {
        const m = equipoList.find(x => x.id == id);
        if(!m) return;
        document.getElementById('modalTitle').innerText = 'EDITAR MIEMBRO';
        document.getElementById('editId').value = m.id;
        document.getElementById('currentImgUrl').value = m.imagen;
        document.getElementById('memName').value = m.nombre;
        document.getElementById('memRole').value = m.rol;
        document.getElementById('memBio').value = m.biografia;
        document.getElementById('memInsta').value = m.instagram;
        
        if (m.imagen) {
            document.getElementById('preview').src = getSafeUrl(m.imagen);
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('uploadContainer').classList.add('hidden');
        }
        document.getElementById('modalAdd').classList.remove('hidden');
    }

    function guardar() {
        const btn = document.getElementById('btnSave');
        const payload = {
            id: document.getElementById('editId').value, nombre: document.getElementById('memName').value,
            rol: document.getElementById('memRole').value, biografia: document.getElementById('memBio').value,
            instagram: document.getElementById('memInsta').value, imagenBase64: document.getElementById('compressedBase64').value,
            imagenActual: document.getElementById('currentImgUrl').value
        };

        if(!payload.nombre || !payload.rol) { alert("Falta Nombre o Rol"); return; }
        btn.innerText = "GUARDANDO..."; btn.disabled = true;
        google.script.run
            .withSuccessHandler(r => {
                btn.innerText = "GUARDAR"; btn.disabled = false;
                if(r.success) { cerrarModal(); cargarDatos(); } else alert("Error: " + r.error);
            }).withFailureHandler((err) => { alert("Error de red: " + err.message); btn.innerText = "GUARDAR"; btn.disabled = false; })
            .procesarMiembro(payload);
    }

    function borrar(id) {
        if(confirm("¿Eliminar este miembro del equipo?")) { google.script.run.withSuccessHandler(r => { if(r.success) cargarDatos(); }).borrarMiembro(id); }
    }

    function activarInterfaz() {
        const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.add('hidden');
        const lText = document.getElementById('loginText'); if(lText) lText.innerText = 'LOGOUT';
        const bAdd = document.getElementById('btnAdd');
        
        if(currentUserRole === 'MASTER') {
            if(bAdd) bAdd.classList.remove('hidden');
        } else {
            if(bAdd) bAdd.classList.add('hidden');
        }
        cargarDatos();
    }

    function toggleLogin() {
      if(currentUserRole !== null) {
        currentUserRole = null; currentUserName = ''; localStorage.removeItem('fr_role'); localStorage.removeItem('fr_name');
        const lText = document.getElementById('loginText'); if(lText) lText.innerText = 'LOGIN';
        const bAdd = document.getElementById('btnAdd'); if(bAdd) bAdd.classList.add('hidden');
        cargarDatos();
      } else { 
        const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.remove('hidden'); 
        setTimeout(() => { const em = document.getElementById('userEmail'); if(em) em.focus(); }, 100);
      }
    }
    
    function cerrarLogin() { const mLogin = document.getElementById('modalLogin'); if(mLogin) mLogin.classList.add('hidden'); }
    
    function doLogin() {
      const email = document.getElementById('userEmail').value.trim(); const pass = document.getElementById('userPass').value.trim();
      const btn = document.getElementById('btnEntrar'); btn.innerText = 'VERIFICANDO...'; btn.disabled = true;

      google.script.run
          .withSuccessHandler((res) => {
              btn.innerText = 'ENTRAR'; btn.disabled = false;
              if(res.success) {
                  currentUserRole = res.role; currentUserName = res.nombre;
                  localStorage.setItem('fr_role', res.role); localStorage.setItem('fr_name', res.nombre);
                  document.getElementById('userEmail').value = ''; document.getElementById('userPass').value = '';
                  activarInterfaz();
              } else { alert(res.error); }
          })
          .withFailureHandler((err) => { btn.innerText = 'ENTRAR'; btn.disabled = false; alert('Error de conexión: ' + err.message); })
          .validarAcceso(email, pass);
    }
  </script>
</body>
</html>
