<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script>
      function onSuccess(html) {
        document.open();
        document.write(html);
        document.close();
      }

      window.onload = function() {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var view = isMobile ? 'Celular' : 'Interfaz';
        
        google.script.run.withSuccessHandler(onSuccess).getView(view);
      };
    </script>
    <style>
      body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #F4F9F9; color: #2A9D8F; }
      .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2A9D8F; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div style="text-align:center">
      <div class="loader" style="margin:0 auto 20px auto;"></div>
      <p>Cargando Bobbastik...</p>
    </div>
  </body>
</html>
