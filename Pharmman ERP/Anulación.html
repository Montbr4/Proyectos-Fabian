<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #2E86AB; --bg: #f0f2f5; --white: #ffffff; --text: #333; --danger: #e74c3c; --danger-dark: #c0392b; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); min-height: 100vh; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
    
    .nav-floating { position: fixed; top: 20px; z-index: 100; display: flex; gap: 10px; }
    .nav-floating.left { left: 20px; }
    .nav-floating.right { right: 20px; }
    
    .nav-btn-float { 
        background: #000; 
        color: white; 
        padding: 10px 20px; 
        border-radius: 30px; 
        text-decoration: none; 
        font-size: 0.9rem; 
        font-weight: 700; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        transition: all 0.3s ease; 
        
        opacity: 0.5; 
        pointer-events: none; 
        cursor: wait; 
    }

    .nav-btn-float.active {
        opacity: 1; 
        pointer-events: auto; 
        cursor: pointer;
    }

    .nav-btn-float.active:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
    .nav-btn-float.accent.active { background: var(--primary); }
    .nav-btn-float.home.active { background: #333; }

    .card { background: var(--white); padding: 50px 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border-top: 6px solid var(--danger); animation: fadeIn 0.5s ease; position: relative; }
    
    h2 { color: var(--danger); margin: 0 0 10px 0; font-weight: 700; font-size: 1.8rem; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #555; margin-left: 5px; }
    input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; font-family: inherit; font-size: 1rem; background: #fafafa; transition: all 0.3s; box-sizing: border-box; }
    input:focus { border-color: var(--danger); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1); }
    
    .btn { background: var(--danger); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: all 0.3s ease; margin-top: 10px; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); letter-spacing: 0.5px; }
    .btn:hover { background: var(--danger-dark); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4); }
    .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

    .warning-icon { font-size: 3rem; margin-bottom: 15px; display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="nav-floating left">
      <a id="homeLink" class="nav-btn-float home">🏠 MENÚ</a>
  </div>
  <div class="nav-floating right">
      <a id="salesLink" class="nav-btn-float accent">💰 VENTA</a>
  </div>

  <div class="card">
    <span class="warning-icon">⚠️</span>
    <h2>Anular Venta</h2>
    <p>Esta acción es irreversible. Se restaurará el stock y se eliminará el registro de venta permanentemente.</p>
    
    <div class="input-group">
        <label>ID de Venta</label>
        <input type="text" id="anularID" placeholder="ID de Venta de Rappi">
    </div>
    
    <div class="input-group">
        <label>Motivo de Anulación</label>
        <input type="text" id="anularMotivo" placeholder="Ej: Error de digitación, Devolución...">
    </div>
    
    <button id="btnAnular" class="btn" onclick="anularVenta()">CONFIRMAR ANULACIÓN</button>
  </div>

  <script>
    let currentUser = "<?= usuario ?>";
    let currentSede = "<?= sede ?>";

    google.script.run.withSuccessHandler(url => {
        const homeLink = document.getElementById('homeLink');
        const salesLink = document.getElementById('salesLink');
        
        homeLink.href = url + "?page=inicio&usuario=" + currentUser;
        salesLink.href = url + "?page=ventas&sede=" + currentSede + "&usuario=" + currentUser;

        homeLink.classList.add('active');
        salesLink.classList.add('active');
    }).getUrl();

    function anularVenta() {
        const id = document.getElementById('anularID').value;
        const motivo = document.getElementById('anularMotivo').value;
        const btn = document.getElementById('btnAnular');

        if(!id || !motivo) return alert("Por favor, ingrese el ID y el Motivo.");
        
        if(!confirm("¿Está seguro de ANULAR la venta " + id + "?\n\nEl stock será devuelto y el registro borrado.")) return;

        btn.disabled = true;
        btn.innerText = "Procesando...";

        google.script.run
        .withSuccessHandler(res => {
            alert(res.msg);
            btn.disabled = false;
            btn.innerText = "CONFIRMAR ANULACIÓN";
            if(res.exito) {
                document.getElementById('anularID').value = '';
                document.getElementById('anularMotivo').value = '';
            }
        })
        .withFailureHandler(err => {
            alert("Error de conexión: " + err);
            btn.disabled = false;
            btn.innerText = "CONFIRMAR ANULACIÓN";
        })
        .procesarAnulacionVenta(id, motivo, currentSede, currentUser);
    }
  </script>
</body>
</html>
