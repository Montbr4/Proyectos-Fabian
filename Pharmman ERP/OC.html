<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #2E86AB; --primary-dark: #1c5f7b; --bg: #f0f2f5; --white: #ffffff; --text: #333; --success: #28a745; --danger: #ff6b6b; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); min-height: 100vh; box-sizing: border-box; }
    
    .nav-floating { position: fixed; top: 20px; z-index: 100; display: flex; gap: 10px; }
    .nav-floating.left { left: 20px; }
    
    .nav-btn-float { 
        background: #000; 
        color: white; 
        padding: 10px 20px; 
        border-radius: 30px; 
        text-decoration: none; 
        font-size: 0.9rem; 
        font-weight: 700; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        transition: all 0.3s ease; 
        
        opacity: 0.5; 
        pointer-events: none; 
        cursor: wait; 
    }

    .nav-btn-float.active {
        opacity: 1; 
        pointer-events: auto; 
        cursor: pointer;
    }
    .nav-btn-float.active:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
    .nav-btn-float.accent.active { background: var(--primary); }

    .container { max-width: 1000px; margin: 50px auto 0; animation: fadeIn 0.5s ease; }
    
    .card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.02); }
    
    h2 { color: var(--success); margin: 0 0 30px 0; padding-bottom: 15px; border-bottom: 2px solid rgba(40, 167, 69, 0.1); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    
    .header-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 30px; }
    
    .form-group { margin-bottom: 0; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #555; margin-left: 5px; }
    input, select { width: 100%; padding: 12px 15px; border: 1px solid #eee; border-radius: 10px; font-family: inherit; font-size: 0.95rem; background: #fafafa; transition: all 0.3s; box-sizing: border-box; }
    input:focus, select:focus { border-color: var(--success); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1); }
    
    .add-section { background: #f8f9fa; padding: 25px; border-radius: 15px; border: 1px dashed #ddd; margin-bottom: 30px; position: relative; }
    .add-grid { display: grid; grid-template-columns: 2fr 1fr 0.8fr 0.8fr auto; gap: 15px; align-items: end; }
    
    .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    
    .btn-add { background: var(--success); color: white; width: 45px; height: 45px; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2); margin-bottom: 1px; }
    .btn-add:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3); }
    
    .btn-save { background: var(--primary); color: white; width: 100%; font-size: 1.1rem; padding: 18px; margin-top: 10px; box-shadow: 0 5px 15px rgba(46, 134, 171, 0.2); }
    .btn-save:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(46, 134, 171, 0.3); }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .table-container { overflow-x: auto; margin-bottom: 20px; border-radius: 10px; border: 1px solid #eee; }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th { background: #fafafa; text-align: left; padding: 15px; font-weight: 600; color: #666; font-size: 0.85rem; border-bottom: 1px solid #eee; }
    td { padding: 15px; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    
    .total-display { text-align: right; font-size: 1.5rem; font-weight: 800; color: var(--primary); padding: 15px 0; border-top: 2px dashed #eee; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="nav-floating left">
      <a id="backLink" class="nav-btn-float accent">🏠 MENÚ</a>
  </div>

  <div class="container">
    <div class="card">
      <h2>Generar Orden de Compra</h2>
      
      <div class="header-grid">
          <div class="form-group">
              <label>ID Orden</label>
              <input type="text" id="idOC" placeholder="Ej: OC-001">
          </div>
          <div class="form-group">
              <label>Proveedor</label>
              <select id="proveedor" onchange="filtrarProductosPorProveedor()">
                  <option value="">Seleccione Proveedor</option>
                  <option>Jhoddal</option><option>Nikzon</option><option>Jeffrey</option><option>Mabel</option><option>Medicorp</option><option>Soto</option><option>Yuki</option><option>Otro</option>
              </select>
          </div>
      </div>
      
      <div class="add-section">
          <div class="add-grid">
              <div class="form-group">
                  <label>Producto</label>
                  <input list="listaProductos" id="itemProd" placeholder="Buscar..." onchange="cargarDatosProducto()">
                  <datalist id="listaProductos"></datalist>
              </div>
              
              <div class="form-group">
                  <label>Código</label>
                  <input type="text" id="itemCod" placeholder="S/C" readonly style="background:#eee; color:#888;">
              </div>
              
              <div class="form-group">
                  <label>Cantidad</label>
                  <input type="number" id="itemCant" placeholder="0">
              </div>
              
              <div class="form-group">
                  <label>Costo U.</label>
                  <input type="number" id="itemPrecio" placeholder="0.00">
              </div>
              
              <button class="btn btn-add" onclick="add()">+</button>
          </div>
      </div>

      <div class="table-container">
          <table id="tablaOC">
              <thead><tr><th width="15%">Cód.</th><th width="40%">Producto</th><th width="10%">Cant.</th><th width="15%">Costo U.</th><th width="15%">Subtotal</th><th width="5%"></th></tr></thead>
              <tbody></tbody>
          </table>
          <div id="emptyMsg" style="text-align:center; padding:30px; color:#aaa;">No hay productos en la orden</div>
      </div>

      <div class="total-display" id="totalOC">Total: S/. 0.00</div>
      
      <button id="btnGuardar" class="btn btn-save" onclick="guardar()">GUARDAR Y DESCARGAR CSV 📥</button>
    </div>
  </div>

  <script>
    let items = [];
    let baseDatosOC = [];
    let currentUser = "<?= usuario ?>";

    google.script.run.withSuccessHandler(url => {
        const link = document.getElementById('backLink');
        link.href = url + "?page=inicio&usuario=" + currentUser;
        link.classList.add('active');
    }).getUrl();

    window.onload = function() {
        google.script.run.withSuccessHandler(data => {
            baseDatosOC = data;
        }).obtenerBaseProductosOC();
    };

    function filtrarProductosPorProveedor() {
        const prov = document.getElementById('proveedor').value;
        const lista = document.getElementById('listaProductos');
        const inputProd = document.getElementById('itemProd');
        
        lista.innerHTML = '';
        inputProd.value = '';
        document.getElementById('itemCod').value = '';
        document.getElementById('itemPrecio').value = '';

        if (!prov) return;

        const filtrados = baseDatosOC.filter(p => p.proveedor === prov);
        
        if (filtrados.length === 0 && prov !== 'Otro') {
            console.log("Sin productos en BD para este proveedor");
        }

        filtrados.forEach(p => {
            let option = document.createElement('option');
            option.value = p.producto;
            option.setAttribute('data-cod', p.codigo);
            option.setAttribute('data-costo', p.costo);
            lista.appendChild(option);
        });
    }

    function cargarDatosProducto() {
        const nombreProd = document.getElementById('itemProd').value;
        const lista = document.getElementById('listaProductos');
        const opcion = Array.from(lista.options).find(opt => opt.value === nombreProd);

        if (opcion) {
            document.getElementById('itemCod').value = opcion.getAttribute('data-cod');
            document.getElementById('itemPrecio').value = opcion.getAttribute('data-costo');
        }
    }

    function add() {
        let prod = document.getElementById('itemProd').value;
        let cod = document.getElementById('itemCod').value || "S/C";
        let cant = parseFloat(document.getElementById('itemCant').value);
        let precio = parseFloat(document.getElementById('itemPrecio').value);

        if(!prod || !cant || !precio) return alert("Complete los campos");

        items.push({ codigo: cod, producto: prod, cantidad: cant, precio: precio });
        render();
        
        document.getElementById('itemProd').value = '';
        document.getElementById('itemCod').value = '';
        document.getElementById('itemCant').value = '';
        document.getElementById('itemPrecio').value = '';

        document.getElementById('proveedor').disabled = true;
    }

    function render() {
        let tb = document.querySelector('#tablaOC tbody');
        let empty = document.getElementById('emptyMsg');
        tb.innerHTML = '';
        
        if(items.length === 0) {
            empty.style.display = 'block';
            document.getElementById('totalOC').innerText = "Total: S/. 0.00";
            return;
        } else {
            empty.style.display = 'none';
        }

        let total = 0;
        items.forEach((i, idx) => {
            let sub = i.cantidad * i.precio;
            total += sub;
            tb.innerHTML += `
                <tr>
                    <td>${i.codigo}</td>
                    <td><strong>${i.producto}</strong></td>
                    <td>${i.cantidad}</td>
                    <td>${i.precio.toFixed(2)}</td>
                    <td>${sub.toFixed(2)}</td>
                    <td><button style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold; font-size:1.1rem;" onclick="del(${idx})">×</button></td>
                </tr>`;
        });
        document.getElementById('totalOC').innerText = "Total: S/. " + total.toFixed(2);
    }

    function del(index) {
        items.splice(index, 1);
        render();
        if (items.length === 0) {
            document.getElementById('proveedor').disabled = false;
        }
    }

    function guardar() {
        if(items.length === 0) return alert("Lista vacía");
        let id = document.getElementById('idOC').value;
        if(!id) return alert("Falta ID de la Orden");

        let data = {
            idOrden: id,
            proveedor: document.getElementById('proveedor').value,
            items: items,
            totalEstimado: parseFloat(document.getElementById('totalOC').innerText.replace("Total: S/. ", ""))
        };

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true; 
        btn.innerText = "Guardando...";

        google.script.run
        .withSuccessHandler(res => {
            alert(res);
            downloadCSV(items, id);
            
            items = []; render();
            document.getElementById('idOC').value = '';
            document.getElementById('proveedor').disabled = false;
            
            btn.disabled = false;
            btn.innerText = "GUARDAR Y DESCARGAR CSV 📥";
        })
        .withFailureHandler(err => {
            alert("Error de conexión: " + err);
            btn.disabled = false;
            btn.innerText = "GUARDAR Y DESCARGAR CSV 📥";
        })
        .guardarOC(data, currentUser);
    }

    function downloadCSV(listaItems, filename) {
        let csv = "\uFEFFCodigo,Producto,Cantidad,Costo Unitario,Subtotal\n";
        
        listaItems.forEach(i => { 
            csv += `${i.codigo},"${i.producto}",${i.cantidad},${i.precio},${(i.cantidad*i.precio).toFixed(2)}\n`; 
        });
        
        let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement('a');
        if (link.download !== undefined) {
            let url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename + ".csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
  </script>
</body>
</html>
