<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        :root { --primary: #2E86AB; --bg: #f0f2f5; --card-bg: #ffffff; --text: #333; --accent: #ff6b6b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; color: var(--text); min-height: 100vh; position: relative; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 50px; animation: fadeIn 0.8s ease; }
        
        .logo-main { 
            max-width: 220px; 
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px auto; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .title { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 1.1rem; color: #666; font-weight: 300; margin-top: 5px; }
        
        .welcome-container { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .welcome { background: var(--card-bg); padding: 8px 20px; border-radius: 30px; font-weight: 600; color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 0.9rem; border: 1px solid rgba(0,0,0,0.05); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding-bottom: 100px;
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 30px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            cursor: wait;
            text-decoration: none; 
            color: inherit; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0.6; 
            transform: translateY(20px); 
            pointer-events: none;
            border: 2px solid transparent; 
            grid-column: span 2;
        }

        #linkOC, #linkIR, #linkPC {
            grid-column: span 2;
        }
        
        #linkOC { border-bottom: 4px solid #28a745; }
        #linkIR { border-bottom: 4px solid #d39e00; }
        #linkPC { border-bottom: 4px solid #6f42c1; } 

        .card.active { 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: auto;
            cursor: pointer;
        }
        
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(46, 134, 171, 0.15); border-color: rgba(46, 134, 171, 0.1); }
        
        .icon { font-size: 3.5rem; display: block; margin-bottom: 15px; transition: transform 0.3s ease; }
        .card:hover .icon { transform: scale(1.1); }
        .card-title { font-weight: 700; font-size: 1.2rem; margin: 0; color: var(--text); transition: color 0.3s ease; }
        .card:hover .card-title { color: var(--primary); }
        
        .logout { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--accent); 
            color: white; 
            padding: 15px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 1rem; 
            z-index: 100; 
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4); 
            transition: all 0.3s ease; 
        }
        .logout:hover { background: #ff5252; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5); }
        .logout:disabled { background: #95a5a6; cursor: wait; transform: none; box-shadow: none; opacity: 0.8; }
        
        .footer { text-align: center; margin-top: 40px; color: #aaa; font-size: 0.8rem; font-weight: 500; width: 100%; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .card, #linkOC, #linkIR, #linkPC { grid-column: span 1; }
            .title { font-size: 2rem; }
            .logout { bottom: 20px; right: 20px; padding: 12px 25px; font-size: 0.9rem; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <button onclick="salir()" class="logout" id="btnSalir">Cerrar Sesión</button>

    <script>
        let usuario = "<?= usuario ?>";
        let permisos = JSON.parse('<?= permisos ?>');
        let scriptUrl = "";

        window.onload = function() {
            google.script.run.withSuccessHandler(url => {
                scriptUrl = url;
                setupLinks(url);
            }).getUrl();
        };
        setTimeout(() => {
            if(!scriptUrl) {
                let current = window.location.href.split('?')[0];
                setupLinks(current);
            }
        }, 2000);

        function setupLinks(url) {
            if(!permisos.includes("M")) document.getElementById('linkM').style.display = 'none';
            if(!permisos.includes("S")) document.getElementById('linkS').style.display = 'none';
            if(!permisos.includes("SMP")) document.getElementById('linkSMP').style.display = 'none';
            if(!permisos.includes("OC")) document.getElementById('linkOC').style.display = 'none';
            if(!permisos.includes("IR")) document.getElementById('linkIR').style.display = 'none';
            if(!permisos.includes("PC")) document.getElementById('linkPC').style.display = 'none';

            document.getElementById('linkM').href = url + "?page=ventas&sede=M&usuario=" + usuario;
            document.getElementById('linkS').href = url + "?page=ventas&sede=S&usuario=" + usuario;
            document.getElementById('linkSMP').href = url + "?page=ventas&sede=SMP&usuario=" + usuario;
            document.getElementById('linkOC').href = url + "?page=oc&sede=M&usuario=" + usuario; 
            document.getElementById('linkIR').href = url + "?page=ir&sede=M&usuario=" + usuario; 
            document.getElementById('linkPC').href = url + "?page=bd_pc&usuario=" + usuario; 
            
            document.querySelectorAll('.card').forEach((c, index) => {
                if(c.style.display !== 'none') {
                    setTimeout(() => {
                        c.classList.add('active');
                    }, index * 80); 
                }
            });
        }

        function salir() {
            const btn = document.getElementById('btnSalir');
            btn.disabled = true;
            btn.innerText = "Cerrando...";

            google.script.run
            .withSuccessHandler(redirigirLogin)
            .withFailureHandler(redirigirLogin)
            .registrarLogUsuario(usuario, "SALIDA");

            setTimeout(redirigirLogin, 1500);
        }

        function redirigirLogin() {
            if (scriptUrl) {
                window.top.location.href = scriptUrl;
            } else {
                window.top.location.href = window.location.href.split('?')[0];
            }
        }
    </script>
